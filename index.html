<style>
/* Ho Jin Choi — minimalist research portfolio
 * White, blue + coral only. Compact single-column layout.
 */

:root {
  --bg: #ffffff;
  --ink: #1a1a1a;
  --ink-2: #4a4a4a;
  --muted: #888;
  --rule: #eaeaea;
  --card-edge: #ececec;
  --blue: #1f5fb8;
  --blue-deep: #164a90;
  --blue-soft: #e6eff9;
  --coral: #d65b77;         /* pinkish-purplish-bluish coral */
  --coral-deep: #b84362;
  --coral-soft: #fbe6ec;
  --accent: var(--coral);
}

[data-theme="dark"] {
  --bg: #111216;
  --ink: #ececec;
  --ink-2: #b4b4b4;
  --muted: #7a7a7a;
  --rule: #232428;
  --card-edge: #2a2b30;
  --blue: #7eb0e6;
  --blue-deep: #a9cff0;
  --blue-soft: #182638;
  --coral: #e89aae;
  --coral-deep: #f2b7c6;
  --coral-soft: #2b1b22;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans, -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif);
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
  font-size: 15px;
  transition: background 0.2s, color 0.2s;
}
a { color: var(--blue); text-decoration: none; }
a:hover { color: var(--coral-deep); }

.site { min-height: 100vh; }

/* Font presets */
.font-sans   { --sans: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif; --mono: "JetBrains Mono", ui-monospace, Menlo, monospace; }
.font-serif  { --sans: "Source Serif 4", Georgia, serif; --mono: "JetBrains Mono", ui-monospace, Menlo, monospace; }
.font-mixed  { --sans: "IBM Plex Sans", system-ui, sans-serif; --mono: "IBM Plex Mono", ui-monospace, Menlo, monospace; }

/* TOP BAR — minimal, just a theme toggle */
.topbar {
  position: absolute; top: 20px; right: 24px; z-index: 30;
}
.theme-toggle {
  background: transparent; border: 1px solid var(--rule);
  color: var(--ink-2); padding: 5px 10px; border-radius: 6px;
  font: inherit; font-size: 12px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: border-color .15s, color .15s;
}
.theme-toggle:hover { color: var(--ink); border-color: var(--ink-2); }

/* CONTAINER */
.inner {
  max-width: 780px;
  margin: 0 auto;
  padding: 72px 32px 80px;
}

/* HEADER: avatar on left, intro on right */
.hero {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 32px;
  align-items: flex-start;
  margin-bottom: 48px;
}
.avatar-col {
  display: flex; flex-direction: column; align-items: center;
  gap: 12px;
}
.avatar {
  width: 140px; height: 140px; border-radius: 50%;
  object-fit: cover;
  display: block;
}
.contact-icons {
  display: flex; gap: 14px; align-items: center;
  margin-top: 2px;
}
.contact-icons a {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  color: var(--ink-2);
  border-radius: 50%;
  transition: color .15s, background .15s;
}
.contact-icons a:hover { color: var(--coral); background: var(--coral-soft); }
.contact-icons svg { width: 18px; height: 18px; }

.hero-main h1 {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0 0 4px;
  color: var(--ink);
}
.hero-main .role {
  font-size: 15px; color: var(--ink-2); margin: 0 0 16px;
}
.hero-main .role .accent { color: var(--coral); }
.hero-main .bio {
  font-size: 15px; color: var(--ink-2);
  margin: 0 0 12px;
  line-height: 1.65;
}
.hero-main .bio a { color: var(--blue); border-bottom: 1px solid transparent; transition: border-color .15s; }
.hero-main .bio a:hover { border-bottom-color: var(--blue); }
.hero-main .status {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--coral-deep);
  margin-top: 4px;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--coral);
  box-shadow: 0 0 0 3px var(--coral-soft);
}

/* SECTIONS */
.section { margin-top: 48px; }
.section-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  margin: 0 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
}
.section-title .count {
  color: var(--muted);
  font-weight: 400;
  letter-spacing: 0.02em;
  text-transform: none;
  margin-left: 6px;
  font-size: 12px;
}

/* YEAR GROUPS */
.year-group { display: flex; flex-direction: column; }
.year-head {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin: 18px 0 6px;
  padding-top: 12px;
  border-top: 1px dashed var(--rule);
}
.year-group:first-of-type .year-head { border-top: none; padding-top: 0; margin-top: 0; }

/* ITEM — paper or project */
.item {
  display: grid;
  grid-template-columns: 88px 1fr;
  gap: 16px;
  padding: 10px 0;
  align-items: flex-start;
}
.item-thumb {
  width: 88px; height: 66px;
  border-radius: 3px;
  overflow: hidden;
  background: var(--blue-soft);
  position: relative;
  flex-shrink: 0;
}
.item-thumb-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.item-thumb-ph {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.item-thumb-ph svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
.item-thumb-initials {
  position: relative; z-index: 1;
  font-family: var(--mono);
  font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.item-body { min-width: 0; }
.item-title {
  font-size: 14.5px;
  font-weight: 500;
  color: var(--ink);
  margin: 0 0 2px;
  line-height: 1.4;
  letter-spacing: -0.005em;
}
.item-authors {
  font-size: 14.5px;
  color: var(--ink-2);
  margin: 0 0 3px;
  line-height: 1.4;
}
.item-me { color: var(--ink); font-weight: 600; }
.item-venue {
  font-size: 13px;
  color: var(--muted);
  margin: 0 0 4px;
  font-style: italic;
}
.item-venue .badge {
  font-style: normal;
  color: var(--coral);
  font-weight: 500;
}
.item-venue .kind-tag {
  font-style: normal;
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--blue);
  background: var(--blue-soft);
  padding: 1px 6px;
  border-radius: 3px;
  margin-right: 6px;
  font-weight: 500;
  vertical-align: 1px;
}
.item-venue .kind-tag.kind-project { color: var(--coral-deep); background: var(--coral-soft); }

.item-links {
  display: inline-flex; gap: 10px; margin-top: 1px;
  font-size: 13px;
  flex-wrap: wrap;
  align-items: center;
}
.item-links a, .item-links button {
  color: var(--blue);
  background: transparent;
  border: none; padding: 0;
  font: inherit; font-size: 13px; cursor: pointer;
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 3px;
}
.item-links a:hover, .item-links button:hover { color: var(--coral-deep); text-decoration: underline; }
.item-links .sep { color: var(--rule); }

.item-abstract {
  font-size: 13.5px;
  color: var(--ink-2);
  margin: 8px 0 4px;
  line-height: 1.6;
  padding: 10px 14px;
  background: var(--blue-soft);
  border-left: 2px solid var(--blue);
  border-radius: 0 3px 3px 0;
}

/* NEWS — compact bottom section */
.news-list { list-style: none; padding: 0; margin: 0; }
.news-list li {
  display: grid;
  grid-template-columns: 88px 1fr;
  gap: 16px;
  padding: 6px 0;
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.5;
}
.news-date {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--coral);
  letter-spacing: 0.02em;
}

/* FOOTER */
.foot {
  margin-top: 56px;
  padding-top: 20px;
  border-top: 1px solid var(--rule);
  font-size: 12px;
  color: var(--muted);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}

/* BIBTEX modal */
.bib-backdrop {
  position: fixed; inset: 0; z-index: 60;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.bib-modal {
  background: var(--bg);
  border: 1px solid var(--card-edge);
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  width: 100%; max-width: 600px;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.bib-head {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--rule);
}
.bib-eyebrow {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--coral); font-weight: 600; margin-bottom: 3px;
}
.bib-title { font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.4; max-width: 50ch; }
.bib-close { background: transparent; border: none; color: var(--ink-2); font-size: 20px; cursor: pointer; line-height: 1; padding: 0 4px; }
.bib-close:hover { color: var(--coral); }
.bib-text {
  width: 100%;
  min-height: 160px;
  padding: 14px 20px;
  font-family: var(--mono);
  font-size: 12px; line-height: 1.55;
  color: var(--ink); background: var(--blue-soft);
  border: none; outline: none; resize: vertical;
}
[data-theme="dark"] .bib-text { background: #1a1b20; }
.bib-actions { padding: 12px 20px; display: flex; justify-content: flex-end; border-top: 1px solid var(--rule); }
.bib-copy {
  background: var(--coral); color: #fff; border: none;
  padding: 7px 16px; border-radius: 5px;
  font: inherit; font-size: 12px; font-weight: 500; cursor: pointer;
  transition: filter .15s;
}
.bib-copy:hover { filter: brightness(1.06); }

/* TWEAKS panel */
.tweaks {
  position: fixed; right: 20px; bottom: 20px; z-index: 50;
  background: var(--bg);
  border: 1px solid var(--card-edge);
  border-radius: 8px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  padding: 14px;
  width: 260px;
  font-size: 12px;
}
.tweaks-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.tweaks-head strong { color: var(--ink); font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
.tweaks-close { background: transparent; border: none; color: var(--ink-2); font-size: 18px; cursor: pointer; line-height: 1; padding: 0 4px; }
.tweak-group { margin-bottom: 10px; }
.tweak-label {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); font-weight: 600; margin-bottom: 5px;
}
.tweak-options { display: flex; flex-wrap: wrap; gap: 4px; }
.tweak-opt {
  background: transparent; color: var(--ink-2);
  border: 1px solid var(--rule); border-radius: 4px;
  padding: 4px 9px; font: inherit; font-size: 11px; cursor: pointer;
  transition: all .15s;
}
.tweak-opt:hover { color: var(--ink); border-color: var(--ink-2); }
.tweak-opt.is-on { background: var(--coral); color: #fff; border-color: var(--coral); }
.tweaks-hint { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .inner { padding: 48px 20px 64px; }
  .hero { grid-template-columns: 1fr; gap: 16px; text-align: center; }
  .avatar-col { align-items: center; }
  .hero-main { text-align: left; }
  .item { grid-template-columns: 64px 1fr; gap: 12px; }
  .item-thumb { width: 64px; height: 48px; }
  .news-list li { grid-template-columns: 72px 1fr; gap: 12px; }
}

</style>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
// Shared: inline SVG icons and BibTeX modal

(function () {
  function Icon({ name, size = 18 }) {
    const p = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.7, strokeLinecap: "round", strokeLinejoin: "round" };
    if (name === "mail") return <svg {...p}><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 7 9-7"/></svg>;
    if (name === "github") return <svg {...p}><path d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2 2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 0 0-1.3-3.2 4.2 4.2 0 0 0-.1-3.2s-1.1-.3-3.5 1.3a12 12 0 0 0-6.2 0C6.5 2.8 5.4 3.1 5.4 3.1a4.2 4.2 0 0 0-.1 3.2A4.6 4.6 0 0 0 4 9.5c0 4.6 2.7 5.7 5.5 6-.6.6-.6 1.2-.5 2V21"/></svg>;
    if (name === "linkedin") return <svg {...p}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>;
    if (name === "scholar") return <svg {...p}><path d="M12 3L2 9l10 6 10-6-10-6z"/><path d="M6 10v5c0 1.7 2.7 3 6 3s6-1.3 6-3v-5"/></svg>;
    if (name === "external") return <svg {...p}><path d="M10 14L21 3M21 3h-6M21 3v6M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>;
    return null;
  }

  function PaperThumb({ paper }) {
    const [failed, setFailed] = React.useState(false);
    const seed = (paper.id || paper.title).split("").reduce((a, c) => (a * 31 + c.charCodeAt(0)) | 0, 0);
    // blue + coral variants only (no orange/amber)
    const palette = paper.kind === "project"
      ? [[340, 55, 58], [350, 50, 62], [330, 48, 56]]   // coral family
      : [[215, 60, 48], [220, 55, 42], [208, 50, 55]];  // blue family
    const [h, s, l] = palette[Math.abs(seed) % palette.length];
    const h2 = (h + 20) % 360;

    if (paper.thumb && !failed) {
      return (
        <img
          src={paper.thumb}
          alt={paper.teaserAlt || paper.title}
          className="item-thumb-img"
          onError={() => setFailed(true)}
          loading="lazy"
        />
      );
    }
    const initials = (paper.id || "")
      .split(/[-_]/).map((s) => s[0]).join("").slice(0, 3).toUpperCase();

    return (
      <div className="item-thumb-ph" aria-label={paper.teaserAlt || paper.title}>
        <svg viewBox="0 0 88 66" preserveAspectRatio="none">
          <defs>
            <linearGradient id={`pg-${paper.id}`} x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stopColor={`hsl(${h} ${s}% ${l}%)`} />
              <stop offset="1" stopColor={`hsl(${h2} ${s}% ${Math.max(28, l - 14)}%)`} />
            </linearGradient>
          </defs>
          <rect width="88" height="66" fill={`url(#pg-${paper.id})`} />
          <circle cx={20 + (Math.abs(seed) % 48)} cy={40} r="14" fill="rgba(255,255,255,0.14)" />
        </svg>
        <span className="item-thumb-initials">{initials}</span>
      </div>
    );
  }

  function BibTexModal({ paper, onClose }) {
    const [copied, setCopied] = React.useState(false);
    const textRef = React.useRef(null);

    React.useEffect(() => {
      const onKey = (e) => e.key === "Escape" && onClose();
      document.addEventListener("keydown", onKey);
      return () => document.removeEventListener("keydown", onKey);
    }, [onClose]);

    const copy = async () => {
      try {
        await navigator.clipboard.writeText(paper.bibtex);
        setCopied(true); setTimeout(() => setCopied(false), 1600);
      } catch {
        if (textRef.current) {
          textRef.current.select(); document.execCommand("copy");
          setCopied(true); setTimeout(() => setCopied(false), 1600);
        }
      }
    };

    return ReactDOM.createPortal(
      <div className="bib-backdrop" onClick={onClose}>
        <div className="bib-modal" onClick={(e) => e.stopPropagation()}>
          <div className="bib-head">
            <div>
              <div className="bib-eyebrow">BibTeX</div>
              <div className="bib-title">{paper.title}</div>
            </div>
            <button className="bib-close" onClick={onClose} aria-label="Close">×</button>
          </div>
          <textarea ref={textRef} className="bib-text" value={paper.bibtex} readOnly spellCheck="false" />
          <div className="bib-actions">
            <button className="bib-copy" onClick={copy}>{copied ? "✓ Copied" : "Copy to clipboard"}</button>
          </div>
        </div>
      </div>,
      document.body
    );
  }

  Object.assign(window, { Icon, PaperThumb, BibTexModal });
})();

</script>

<script type="text/babel" data-presets="react">
// Ho Jin Choi — minimalist portfolio app

(function () {
  const D = window.SITE_DATA;
  const { Icon, PaperThumb, BibTexModal } = window;

  // Group items by year, preserving order within each year
  function groupByYear(items) {
    const map = new Map();
    for (const it of items) {
      if (!map.has(it.year)) map.set(it.year, []);
      map.get(it.year).push(it);
    }
    return [...map.entries()].sort((a, b) => b[0].localeCompare(a[0]));
  }

  function RenderBio({ bio }) {
    return (
      <p className="bio">
        {bio.map((seg, i) => {
          if (typeof seg === "string") return <React.Fragment key={i}>{seg} </React.Fragment>;
          return <a key={i} href={seg.url} target="_blank" rel="noreferrer">{seg.text}</a>;
        })}
      </p>
    );
  }

  function Item({ it, expand }) {
    const [open, setOpen] = React.useState(false);
    const [showBib, setShowBib] = React.useState(false);

    return (
      <article className="item" id={`item-${it.id}`}>
        <div className="item-thumb"><PaperThumb paper={it} /></div>
        <div className="item-body">
          <h3 className="item-title">{it.title}</h3>
          <p className="item-authors">
            {it.authors.map((a, i) => (
              <React.Fragment key={i}>
                <span className={a.includes("Choi") && (a.startsWith("H.") || a.startsWith("Ho")) ? "item-me" : ""}>{a}</span>
                {i < it.authors.length - 1 && ", "}
              </React.Fragment>
            ))}
          </p>
          <p className="item-venue">
            <span className={`kind-tag kind-${it.kind}`}>{it.kind}</span>
            <span className="badge">{it.badge}</span>
            {it.year && <> · {it.year}</>}
          </p>
          <div className="item-links">
            {it.abstract && expand && (
              <button onClick={() => setOpen(!open)}>{open ? "hide abstract" : "abstract"}</button>
            )}
            {it.links.map((l, i) => (
              <React.Fragment key={i}>
                {(i > 0 || (it.abstract && expand)) && <span className="sep">·</span>}
                <a href={l.url} target="_blank" rel="noreferrer">{l.label}</a>
              </React.Fragment>
            ))}
            {it.bibtex && (
              <>
                <span className="sep">·</span>
                <button onClick={() => setShowBib(true)}>bibtex</button>
              </>
            )}
          </div>
          {open && it.abstract && <p className="item-abstract">{it.abstract}</p>}
        </div>
        {showBib && <BibTexModal paper={it} onClose={() => setShowBib(false)} />}
      </article>
    );
  }

  function ThemeToggle({ theme, setTheme }) {
    const cycle = () => setTheme(theme === "auto" ? "light" : theme === "light" ? "dark" : "auto");
    const label = theme === "auto" ? "auto" : theme;
    const icon = theme === "dark" ? "☾" : theme === "light" ? "☀" : "◐";
    return (
      <button className="theme-toggle" onClick={cycle} title={`theme: ${label}`}>
        <span>{icon}</span><span>{label}</span>
      </button>
    );
  }

  function App() {
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "font": "sans",
      "expandAbstracts": false,
      "groupBy": "year"
    }/*EDITMODE-END*/;

    const [font, setFont] = React.useState(TWEAK_DEFAULTS.font);
    const [expandAbstracts, setExpandAbstracts] = React.useState(TWEAK_DEFAULTS.expandAbstracts);
    const [groupBy, setGroupBy] = React.useState(TWEAK_DEFAULTS.groupBy);
    const [theme, setTheme] = React.useState(() => localStorage.getItem("hjc-theme") || "auto");
    const [tweaksOpen, setTweaksOpen] = React.useState(false);

    React.useEffect(() => {
      localStorage.setItem("hjc-theme", theme);
      if (theme === "auto") document.documentElement.removeAttribute("data-theme");
      else document.documentElement.setAttribute("data-theme", theme);
    }, [theme]);

    React.useEffect(() => {
      const onMsg = (e) => {
        const d = e.data || {};
        if (d.type === "__activate_edit_mode") setTweaksOpen(true);
        if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
      };
      window.addEventListener("message", onMsg);
      window.parent.postMessage({ type: "__edit_mode_available" }, "*");
      return () => window.removeEventListener("message", onMsg);
    }, []);

    const persist = (edits) => window.parent.postMessage({ type: "__edit_mode_set_keys", edits }, "*");
    const update = {
      font: (v) => { setFont(v); persist({ font: v }); },
      expand: (v) => { setExpandAbstracts(v); persist({ expandAbstracts: v }); },
      group: (v) => { setGroupBy(v); persist({ groupBy: v }); },
    };

    const grouped = groupByYear(D.items);

    return (
      <div className={`site font-${font}`}>
        <div className="topbar">
          <ThemeToggle theme={theme} setTheme={setTheme} />
        </div>

        <main className="inner">
          {/* HEADER */}
          <section className="hero">
            <div className="avatar-col">
              <img src={D.headshot} alt={D.name} className="avatar" />
              <div className="contact-icons">
                <a href={`mailto:${D.contact.email}`} title={D.contact.email} aria-label="Email"><Icon name="mail" /></a>
                <a href={D.contact.githubUrl} target="_blank" rel="noreferrer" title="GitHub" aria-label="GitHub"><Icon name="github" /></a>
                <a href={D.contact.linkedinUrl} target="_blank" rel="noreferrer" title="LinkedIn" aria-label="LinkedIn"><Icon name="linkedin" /></a>
              </div>
            </div>
            <div className="hero-main">
              <h1>{D.name}</h1>
              <p className="role">{D.role} <span className="accent">·</span> {D.affiliation}</p>
              <RenderBio bio={D.bio} />
              <div className="status">
                <span className="status-dot" />
                <span>{D.status}</span>
              </div>
            </div>
          </section>

          {/* PUBLICATIONS & PROJECTS */}
          <section className="section">
            <h2 className="section-title">
              Publications & Projects
              <span className="count">({D.items.length})</span>
            </h2>
            {groupBy === "year" ? (
              grouped.map(([year, items]) => (
                <div className="year-group" key={year}>
                  <div className="year-head">{year}</div>
                  {items.map((it) => <Item key={it.id} it={it} expand={expandAbstracts} />)}
                </div>
              ))
            ) : (
              <div className="year-group">
                {D.items.map((it) => <Item key={it.id} it={it} expand={expandAbstracts} />)}
              </div>
            )}
          </section>

          {/* NEWS */}
          <section className="section">
            <h2 className="section-title">News</h2>
            <ul className="news-list">
              {D.news.map((n, i) => (
                <li key={i}>
                  <span className="news-date">{n.date}</span>
                  <span>{n.text}</span>
                </li>
              ))}
            </ul>
          </section>

          <footer className="foot">
            <span>© {new Date().getFullYear()} {D.name}</span>
            <span>Advised by <a href={D.advisorUrl} target="_blank" rel="noreferrer">{D.advisor}</a> · <a href={D.labUrl} target="_blank" rel="noreferrer">{D.lab}</a></span>
          </footer>
        </main>

        {tweaksOpen && (
          <div className="tweaks">
            <div className="tweaks-head">
              <strong>Tweaks</strong>
              <button className="tweaks-close" onClick={() => setTweaksOpen(false)}>×</button>
            </div>
            <TweakGroup label="Font" value={font} onChange={update.font} options={[
              { v: "sans", l: "Sans" },
              { v: "serif", l: "Serif" },
              { v: "mixed", l: "Plex" },
            ]} />
            <TweakGroup label="Abstracts" value={expandAbstracts ? "on" : "off"}
              onChange={(v) => update.expand(v === "on")} options={[
              { v: "on", l: "Expandable" },
              { v: "off", l: "Hidden" },
            ]} />
            <TweakGroup label="Group by" value={groupBy} onChange={update.group} options={[
              { v: "year", l: "Year" },
              { v: "none", l: "None" },
            ]} />
            <div className="tweaks-hint">Changes persist across refreshes.</div>
          </div>
        )}
      </div>
    );
  }

  function TweakGroup({ label, value, options, onChange }) {
    return (
      <div className="tweak-group">
        <div className="tweak-label">{label}</div>
        <div className="tweak-options">
          {options.map((o) => (
            <button key={o.v} className={`tweak-opt ${value === o.v ? "is-on" : ""}`} onClick={() => onChange(o.v)}>
              {o.l}
            </button>
          ))}
        </div>
      </div>
    );
  }

  window.App = App;
})();

</script>

<script type="text/babel" data-presets="react">
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
